<div class="row justify-content-center min-vh-100 align-items-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg p-4">
      <h2 class="text-center mb-4">Create account</h2>
      @if (error) {
        <div class="alert alert-danger">{{ error }}</div>
      }
      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" [(ngModel)]="name" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password" minlength="6" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" [(ngModel)]="role" name="role">
            @for (r of roles; track r) {
              <option [value]="r">{{ r }}</option>
            }
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Register' }}
        </button>
      </form>
      <p class="mt-3 text-center text-muted">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </div>
  </div>
</div>
