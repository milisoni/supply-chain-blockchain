<h1 class="page-title">Update Shipment Status</h1>
<div class="card col-lg-6">
  <div class="card-body">
    <p class="text-muted small">Transporter: update status (Dispatched → In Transit → Delivered). Recorded on blockchain.</p>
    @if (error) {
      <div class="alert alert-danger">{{ error }}</div>
    }
    @if (success) {
      <div class="alert alert-success">{{ success }}</div>
    }
    <form (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Blockchain Shipment ID</label>
        <input type="text" class="form-control" [(ngModel)]="blockchainShipmentId" name="blockchainShipmentId" placeholder="0x...">
      </div>
      <div class="mb-3">
        <label class="form-label">New status</label>
        <select class="form-select" [(ngModel)]="status" name="status">
          @for (opt of statusOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Updating...' : 'Update status' }}
      </button>
    </form>
  </div>
</div>
